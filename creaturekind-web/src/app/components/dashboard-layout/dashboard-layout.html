<div class="dashboard-container">
  
  <!-- IL PULSANTE HAMBURGER (Sempre visibile in alto a sinistra) -->
  <button class="menu-toggle-btn" (click)="toggleSidebar()" [class.shifted]="!isSidebarOpen">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- LA SIDEBAR (Si rimpicciolisce se isSidebarOpen è false) -->
  <aside class="sidebar" [class.closed]="!isSidebarOpen">
    <div class="brand">
      <div class="dot"></div> <span class="hide-on-close">Creature<span class="purple">Kind</span></span>
    </div>

    <!-- ... (Tutto il resto della sidebar rimane UGUALE!) ... -->
    <div class="user-card hide-on-close">
      <!-- ... -->
    </div>

    <nav class="nav-menu">
      <a routerLink="/dashboard/profile" routerLinkActive="active" class="nav-item">
        <span class="icon">👤</span> <span class="hide-on-close">Il Mio Profilo</span>
      </a>
      <a routerLink="/dashboard/world" routerLinkActive="active" class="nav-item play-btn">
        <span class="icon">🌍</span> <span class="hide-on-close">Entra nel Mondo</span>
      </a>
      <a class="nav-item disabled">
        <span class="icon">🧬</span> <span class="hide-on-close">DNA Editor</span> <span class="lock hide-on-close">🔒</span>
      </a>
    </nav>

    <div class="bottom-nav">
      <a (click)="logout()" class="nav-item logout" style="cursor: pointer;">
        <span class="icon">🚪</span> <span class="hide-on-close">Disconnetti</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
