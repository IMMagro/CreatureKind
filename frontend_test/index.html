<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatureKind - Simulazione Globale</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden; font-family: monospace;
        }
        #hud {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.8); padding: 15px;
            border: 1px solid #333; border-radius: 8px;
            color: #00ff00; z-index: 10; pointer-events: none;
            font-size: 16px; min-width: 200px;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="hud">⏳ In attesa di connessione...</div>
    <canvas id="worldCanvas"></canvas>
<script>
    const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');

        const WORLD_WIDTH = 6400;
        const WORLD_HEIGHT = 3600;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const ws = new WebSocket(`ws://127.0.0.1:8000/ws`);

        let trackedCreatureId = null; // Il bersaglio agganciato

        ws.onopen = () => {
            setInterval(() => {
                if(ws.readyState === WebSocket.OPEN) {
                    // Chiediamo il mondo e AGGIORNIAMO IL SERVER SU CHI STIAMO GUARDANDO
                    ws.send(JSON.stringify({
                        "action": "req",
                        "track_id": trackedCreatureId
                    }));
                }
            }, 1000 / 30);
        };

        ws.onmessage = (event) => {
            if (!event.data.startsWith('{')) return; 
            const data = JSON.parse(event.data);
            
            // 1. IL SERVER CI HA DATO UN BERSAGLIO VALIDO DA SEGUIRE
            if (data.type === "tracking_id") {
                trackedCreatureId = data.id;
                return; 
            }

            // 2. AGGIORNAMENTO DEL MONDO E DELL'HUD IN TEMPO REALE
            if (data.type === "world_state" || data.pixels) {
                
                // Se stavamo seguendo qualcuno, ma il server non ci manda più i suoi dati... è morto!
                if (trackedCreatureId && !data.tracked_info) {
                    trackedCreatureId = null;
                }

                let hudContent = `
                    <b>CreatureKind Evoluzione</b><br>
                    <hr style="border-color:#333; margin: 5px 0;">
                    🧬 Gen: <b>${data.generation}</b> | ⏳ Tick: ${data.tick}<br><br>
                    🌿 Piante: ${data.plants_count} | 🪨 Biomassa: ${data.biomass_count}<br>
                    🦠 Creature: ${data.creatures_count} | 🥚 Uova: <span style="color:gold">${data.eggs_count}</span>
                `;

                // Disegna i dati LIVE!
                if (data.tracked_info) {
                    hudContent += `
                        <br><br><b>🎯 TRACCIAMENTO ATTIVO</b>
                        <hr style="border-color:#333; margin: 5px 0;">
                        🆔 ID: <span style="color:#33bbff">${data.tracked_info.id}</span><br>
                        ⚡ Energia: ${data.tracked_info.energy} / 1200<br>
                        🧠 Fitness: ${data.tracked_info.fitness}<br>
                        💞 Fertilità: ${data.tracked_info.cooldown === 0 ? '<span style="color:#00ff00">Pronta</span>' : '<span style="color:red">In Cooldown</span>'}
                    `;
                }

                hud.innerHTML = hudContent;
                
                // Ridisegna il canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const scaleX = canvas.width / WORLD_WIDTH;
                const scaleY = canvas.height / WORLD_HEIGHT;

                data.pixels.forEach(p => {
                    let p_type = p[0], p_x = p[1], p_y = p[2];
                    if (p_type === "Power") ctx.fillStyle = "#ff3333";
                    else if (p_type === "Gastro") ctx.fillStyle = "#00ff00";
                    else if (p_type === "Neuro") ctx.fillStyle = "#33bbff";
                    else if (p_type === "Biomass") ctx.fillStyle = "#4a3b2c";
                    else if (p_type === "Egg") ctx.fillStyle = "#ffd700";
                    else ctx.fillStyle = "white";

                    ctx.globalAlpha = (p_type === "Biomass") ? 0.4 : 1.0;
                    let renderWidth = Math.max(2, 10 * scaleX); 
                    let renderHeight = Math.max(2, 10 * scaleY);
                    
                    // Se stiamo tracciando questa creatura, evidenziamola con un bordo bianco!
                    if (trackedCreatureId && (p_type === "Neuro" || p_type === "Gastro" || p_type === "Power")) {
                        // (Non abbiamo l'ID di ogni singolo pixel qui, ma l'effetto è figo lo stesso)
                    }

                    ctx.fillRect(p_x * scaleX, p_y * scaleY, renderWidth, renderHeight);
                });
                ctx.globalAlpha = 1.0;
            }
        };

        canvas.addEventListener('mousedown', (event) => {
            if(ws.readyState !== WebSocket.OPEN) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = (event.clientX - rect.left) * (WORLD_WIDTH / canvas.width);
            const clickY = (event.clientY - rect.top) * (WORLD_HEIGHT / canvas.height);

            if (event.button === 0) {
                trackedCreatureId = null; // Cliccare a vuoto disattiva il tracker
                ws.send(JSON.stringify({"action": "inspect", "x": clickX, "y": clickY}));
            }
            if (event.button === 2) {
                ws.send(JSON.stringify({"action": "spawn_food", "x": clickX, "y": clickY}));
            }
        });

        canvas.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
