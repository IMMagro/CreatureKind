<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatureKind - Simulazione Globale</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; overflow: hidden; font-family: monospace;
        }
        #hud {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.8); padding: 15px;
            border: 1px solid #333; border-radius: 8px;
            color: #00ff00; z-index: 10; pointer-events: none;
            font-size: 16px; min-width: 200px;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="hud">⏳ In attesa di connessione...</div>
    <canvas id="worldCanvas"></canvas>

    <script>
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');

        const WORLD_WIDTH = 6400;
        const WORLD_HEIGHT = 3600;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        console.log("Tentativo di connessione a: ws://" + window.location.host + "/ws");
        const ws = new WebSocket('ws://127.0.0.1:8000/ws');

        ws.onopen = () => {
            console.log("🟢 WebSocket Connesso!");
            hud.innerHTML = "🟢 Connesso! Avvio motore...";
            
            // Chiede i dati al server 30 volte al secondo
            setInterval(() => {
                if(ws.readyState === WebSocket.OPEN) {
                    ws.send("req");
                }
            }, 1000 / 30);
        };

        ws.onmessage = (event) => {
            try {
                // Se il messaggio non sembra JSON, ignoralo
                if (!event.data.startsWith('{')) {
                    console.warn("Messaggio non-JSON ignorato:", event.data);
                    return; 
                }

                const data = JSON.parse(event.data);
                
                hud.innerHTML = `
                    <b>CreatureKind Engine</b><br>
                    <hr style="border-color:#333; margin: 5px 0;">
                    ⏳ Tick: ${data.tick}<br>
                    🌿 Piante: ${data.plants_count} | 🪨 Biomassa: ${data.biomass_count}<br>
                    🦠 Creature (Gen 0): ${data.creatures_count}
                `;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const scaleX = canvas.width / WORLD_WIDTH;
                const scaleY = canvas.height / WORLD_HEIGHT;

                data.pixels.forEach(pixel => {
                    if (pixel.type === "Power") ctx.fillStyle = "#ff3333";
                    else if (pixel.type === "Gastro") ctx.fillStyle = "#00ff00";
                    else if (pixel.type === "Neuro") ctx.fillStyle = "#33bbff";
                    else if (pixel.type === "Biomass") ctx.fillStyle = "#4a3b2c";
                    else ctx.fillStyle = "white";

                    ctx.globalAlpha = (pixel.type === "Biomass") ? 0.4 : 1.0;
                    let renderWidth = Math.max(2, 10 * scaleX); 
                    let renderHeight = Math.max(2, 10 * scaleY);
                    ctx.fillRect(pixel.x * scaleX, pixel.y * scaleY, renderWidth, renderHeight);
                });
                ctx.globalAlpha = 1.0;
            } catch (error) {
                console.error("Errore critico durante il disegno:", error);
            }
        };

        ws.onerror = (error) => {
            console.error("🔴 Errore WebSocket:", error);
            hud.innerHTML = "<span style='color:red'>🔴 Errore di connessione. Controlla la console (F12).</span>";
        };

        ws.onclose = () => {
            console.log("🔴 WebSocket Chiuso.");
            hud.innerHTML = "<span style='color:red'>🔴 Server offline o disconnesso.</span>";
        };
    </script>
</body>
</html>
