<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreatureKind - Simulazione Globale</title>
    <style>
        /* Resettiamo i margini per occupare il 100% dello schermo */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden; /* Toglie le barre di scorrimento */
            font-family: monospace;
        }
        
        /* UI in sovraimpressione (Stile HUD da gioco) */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 5px;
            color: #00ff00;
            z-index: 10;
            pointer-events: none; /* Non blocca i click del mouse */
        }

        /* Il Canvas ora riempirà lo schermo */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="hud">Connessione al Server...</div>
    <canvas id="worldCanvas"></canvas>

    <script>
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');

        // Le nuove dimensioni del server (16:9 per adattarsi ai monitor)
        const WORLD_WIDTH = 6400;
        const WORLD_HEIGHT = 3600;

        // Funzione per ridimensionare il canvas se ridimensioni la finestra del browser
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Chiamata iniziale

        const ws = new WebSocket('ws://localhost:8000/ws');

        ws.onopen = () => {
            setInterval(() => {
                if(ws.readyState === WebSocket.OPEN) ws.send("req");
            }, 1000 / 30);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            hud.innerHTML = `
                <b>CreatureKind Engine</b><br>
                ⏳ Tick: ${data.tick}<br>
                🌿 Piante: ${data.plants_count} | 🪨 Biomassa: ${data.biomass_count}<br>
                🦠 Creature: ${data.creatures_count}
            `;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Calcoliamo la scala dinamicamente in base a quanto è grande la tua finestra
            const scaleX = canvas.width / WORLD_WIDTH;
            const scaleY = canvas.height / WORLD_HEIGHT;

            data.pixels.forEach(pixel => {
                if (pixel.type === "Power") ctx.fillStyle = "#ff3333";
                else if (pixel.type === "Gastro") ctx.fillStyle = "#00ff00";
                else if (pixel.type === "Neuro") ctx.fillStyle = "#33bbff";
                else if (pixel.type === "Biomass") ctx.fillStyle = "#4a3b2c";
                else ctx.fillStyle = "white";

                ctx.globalAlpha = (pixel.type === "Biomass") ? 0.4 : 1.0;

                // Grandezza minima 2 pixel, ma scala proporzionalmente al mondo
                let renderWidth = Math.max(2, 10 * scaleX); 
                let renderHeight = Math.max(2, 10 * scaleY);

                ctx.fillRect(pixel.x * scaleX, pixel.y * scaleY, renderWidth, renderHeight);
            });
            ctx.globalAlpha = 1.0;
        };

        ws.onclose = () => {
            hud.innerHTML = "<span style='color:red'>🔴 Server offline.</span>";
        };
    </script>
</body>
</html>
